<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Danny Bashy | Portfolio</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;

      line-height: 1.6;

    header {
      background: #1f1f1f;
      padding: 40px 20px;
      text-align: center;
      border-bottom: 2px solid #333;
    }

    header h1 {
      margin: 0;
      font-size: 36px;

    }

    header p {
      color: #aaa;
      margin-top: 10px;
    }

    section {
      max-width: 700px;
      margin: 40px auto;
      padding: 0 20px;
    }

    h2 {
      color: #fff;
      border-left: 4px solid #555;
      padding-left: 10px;
    }

    .card {
      background: #1a1a1a;
      padding: 15px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #333;
    }

    a {
      color: #4da3ff;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #666;
      border-top: 1px solid #333;
      margin-top: 40px;
    }
  </style>
</head>
